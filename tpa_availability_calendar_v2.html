<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPA D1 Availability Calendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1F4E78 0%, #2E5C8A 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .login-section {
            background: white;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .login-section h2 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #1F4E78;
        }
        
        .login-form {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 12px;
            align-items: end;
        }
        
        input[type="text"], input[type="email"], select {
            padding: 10px 12px;
            border: 1px solid #D0D0D0;
            border-radius: 6px;
            font-size: 14px;
        }
        
        input[type="text"]:focus, input[type="email"]:focus, select:focus {
            outline: none;
            border-color: #1F4E78;
            box-shadow: 0 0 0 2px rgba(31, 78, 120, 0.1);
        }
        
        button {
            padding: 10px 20px;
            background: #1F4E78;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #163857;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .calendar-wrapper {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: none;
        }
        
        .calendar-wrapper.active {
            display: block;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #E0E0E0;
        }
        
        .calendar-header h2 {
            font-size: 18px;
            color: #1F4E78;
        }
        
        .current-team {
            font-size: 14px;
            color: #666;
        }
        
        .month-nav {
            display: flex;
            gap: 12px;
        }
        
        .month-nav button {
            padding: 8px 12px;
            font-size: 13px;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .day-header {
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            color: #666;
            padding: 12px 0;
        }
        
        .day-cell {
            aspect-ratio: 1;
            border: 1px solid #E0E0E0;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            min-height: 100px;
        }
        
        .day-cell:hover {
            border-color: #1F4E78;
            background: #F5F5F5;
        }
        
        .day-cell.selected {
            background: #D4E7F7;
            border-color: #1F4E78;
            font-weight: 500;
            color: #1F4E78;
        }
        
        .day-cell.other-month {
            background: #FAFAFA;
            color: #CCC;
            cursor: default;
        }
        
        .day-cell.other-month:hover {
            border-color: #E0E0E0;
            background: #FAFAFA;
        }
        
        .day-num {
            font-weight: 600;
        }
        
        .time-indicator {
            font-size: 9px;
            color: #888;
            margin-top: 4px;
            line-height: 1.2;
        }
        
        .time-indicator.selected {
            color: #1F4E78;
            font-weight: 500;
        }
        
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        
        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1F4E78;
        }
        
        .time-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .time-option {
            padding: 12px;
            border: 2px solid #E0E0E0;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        
        .time-option:hover {
            border-color: #1F4E78;
            background: #F5F5F5;
        }
        
        .time-option.selected {
            background: #D4E7F7;
            border-color: #1F4E78;
            font-weight: 600;
            color: #1F4E78;
        }
        
        .time-option-label {
            font-size: 14px;
            font-weight: 500;
        }
        
        .time-option-time {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .time-option.selected .time-option-time {
            color: #1F4E78;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        .modal-actions button {
            padding: 8px 16px;
            font-size: 13px;
        }
        
        .modal-actions .secondary {
            background: #E0E0E0;
            color: #333;
        }
        
        .modal-actions .secondary:hover {
            background: #D0D0D0;
        }
        
        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .actions button {
            padding: 10px 20px;
        }
        
        .actions .secondary {
            background: #E0E0E0;
            color: #333;
        }
        
        .actions .secondary:hover {
            background: #D0D0D0;
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        
        .message.success {
            background: #E8F5E9;
            color: #2E7D32;
            border: 1px solid #A5D6A7;
        }
        
        .message.error {
            background: #FFEBEE;
            color: #C62828;
            border: 1px solid #EF9A9A;
        }
        
        .legend {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #E0E0E0;
            font-size: 13px;
            color: #666;
        }
        
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-right: 24px;
        }
        
        .legend-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid #E0E0E0;
        }
        
        .legend-box.selected {
            background: #D4E7F7;
            border-color: #1F4E78;
        }
        
        .summary {
            background: #F9F9F9;
            border: 1px solid #E0E0E0;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        
        .summary-title {
            font-weight: 600;
            color: #1F4E78;
            margin-bottom: 8px;
        }
        
        .summary-item {
            padding: 4px 0;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .login-form {
                grid-template-columns: 1fr;
            }
            
            .calendar-grid {
                grid-template-columns: repeat(7, 1fr);
                gap: 4px;
            }
            
            .day-cell {
                font-size: 10px;
                padding: 4px;
                min-height: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TPA D1 League — Availability Calendar</h1>
            <p class="subtitle">Mark your team's available playing days & preferred times</p>
        </header>
        
        <div class="login-section">
            <h2>Select Your Team</h2>
            <div class="login-form">
                <input type="text" id="teamName" placeholder="Your team name (e.g., Asawachatroj / Rungsaeng)" />
                <input type="email" id="contactEmail" placeholder="Your email (for follow-up)" />
                <button onclick="startCalendar()">Continue</button>
            </div>
            <div id="message"></div>
        </div>
        
        <div class="calendar-wrapper" id="calendarWrapper">
            <div class="calendar-header">
                <div>
                    <h2 id="monthYear"></h2>
                    <p class="current-team" id="currentTeam"></p>
                </div>
                <div class="month-nav">
                    <button onclick="prevMonth()">← Previous</button>
                    <button onclick="nextMonth()">Next →</button>
                </div>
            </div>
            
            <div class="summary" id="summary" style="display: none;">
                <div class="summary-title">Your Selection</div>
                <div id="summaryContent"></div>
            </div>
            
            <div class="calendar-grid" id="calendarGrid"></div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-box selected"></div>
                    <span>Selected with time preference</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box"></div>
                    <span>Not available</span>
                </div>
            </div>
            
            <div class="actions">
                <button onclick="saveToSheet()">Save My Availability</button>
                <button class="secondary" onclick="resetForm()">Start Over</button>
            </div>
        </div>
    </div>

    <!-- Time Selection Modal -->
    <div class="modal" id="timeModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle"></div>
            <div class="time-options" id="timeOptions"></div>
            <div class="modal-actions">
                <button class="secondary" onclick="closeTimeModal()">Cancel</button>
                <button onclick="confirmTime()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDays = new Map(); // Date string -> time preference
        let currentTeam = null;
        let currentEmail = null;
        let selectedDateForModal = null;
        let selectedTimeForModal = null;
        
        const timeSlots = [
            { label: 'Morning', time: '09:00 - 12:00' },
            { label: 'Afternoon', time: '12:00 - 16:00' },
            { label: 'Evening', time: '16:00 - 20:00' },
            { label: 'Flexible (Anytime)' }
        ];
        
        function startCalendar() {
            const team = document.getElementById('teamName').value.trim();
            const email = document.getElementById('contactEmail').value.trim();
            
            if (!team || !email) {
                showMessage('Please fill in both team name and email', 'error');
                return;
            }
            
            currentTeam = team;
            currentEmail = email;
            
            document.querySelector('.login-section').style.display = 'none';
            document.getElementById('calendarWrapper').classList.add('active');
            document.getElementById('currentTeam').textContent = `${team} • ${email}`;
            
            renderCalendar();
        }
        
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('monthYear').textContent = new Date(year, month).toLocaleDateString('en-US', {
                month: 'long',
                year: 'numeric'
            });
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDayOfWeek = firstDay.getDay();
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            dayNames.forEach(day => {
                const header = document.createElement('div');
                header.className = 'day-header';
                header.textContent = day;
                grid.appendChild(header);
            });
            
            for (let i = 0; i < startingDayOfWeek; i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell other-month';
                grid.appendChild(cell);
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                cell.className = 'day-cell';
                if (selectedDays.has(dateKey)) {
                    cell.classList.add('selected');
                }
                
                const dayNum = document.createElement('div');
                dayNum.className = 'day-num';
                dayNum.textContent = day;
                cell.appendChild(dayNum);
                
                if (selectedDays.has(dateKey)) {
                    const timeInd = document.createElement('div');
                    timeInd.className = 'time-indicator selected';
                    timeInd.textContent = selectedDays.get(dateKey);
                    cell.appendChild(timeInd);
                }
                
                cell.addEventListener('click', () => openTimeModal(dateKey, day));
                grid.appendChild(cell);
            }
            
            updateSummary();
        }
        
        function openTimeModal(dateKey, day) {
            selectedDateForModal = dateKey;
            selectedTimeForModal = null;
            
            document.getElementById('modalTitle').textContent = `Select time for ${new Date(dateKey).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
            
            const timeOptions = document.getElementById('timeOptions');
            timeOptions.innerHTML = '';
            
            timeSlots.forEach(slot => {
                const option = document.createElement('div');
                option.className = 'time-option';
                if (selectedDays.has(dateKey) && selectedDays.get(dateKey) === slot.label) {
                    option.classList.add('selected');
                    selectedTimeForModal = slot.label;
                }
                
                option.innerHTML = `
                    <div class="time-option-label">${slot.label}</div>
                    ${slot.time ? `<div class="time-option-time">${slot.time}</div>` : ''}
                `;
                
                option.addEventListener('click', () => selectTime(option, slot.label));
                timeOptions.appendChild(option);
            });
            
            document.getElementById('timeModal').classList.add('active');
        }
        
        function selectTime(element, label) {
            document.querySelectorAll('.time-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedTimeForModal = label;
        }
        
        function confirmTime() {
            if (selectedTimeForModal) {
                selectedDays.set(selectedDateForModal, selectedTimeForModal);
                closeTimeModal();
                renderCalendar();
            }
        }
        
        function closeTimeModal() {
            document.getElementById('timeModal').classList.remove('active');
            selectedDateForModal = null;
            selectedTimeForModal = null;
        }
        
        function updateSummary() {
            if (selectedDays.size === 0) {
                document.getElementById('summary').style.display = 'none';
                return;
            }
            
            const summary = document.getElementById('summary');
            const content = document.getElementById('summaryContent');
            
            const sortedDates = Array.from(selectedDays.keys()).sort();
            let html = '';
            
            sortedDates.forEach(date => {
                const timeSlot = selectedDays.get(date);
                const dateObj = new Date(date);
                const formatted = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
                html += `<div class="summary-item">${formatted} → ${timeSlot}</div>`;
            });
            
            content.innerHTML = html;
            summary.style.display = 'block';
        }
        
        function prevMonth() {
            currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1);
            renderCalendar();
        }
        
        function nextMonth() {
            currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1);
            renderCalendar();
        }
        
        function saveToSheet() {
            if (selectedDays.size === 0) {
                showMessage('Please select at least one available day', 'error');
                return;
            }
            
            const daysArray = Array.from(selectedDays.entries()).map(([date, time]) => ({
                date: date,
                timeSlot: time
            }));
            
            const payload = {
                team: currentTeam,
                email: currentEmail,
                availability: daysArray,
                submittedAt: new Date().toISOString()
            };
            
            console.log('Saving to sheet:', payload);
            
            fetch('https://script.google.com/macros/s/AKfycbyYkgfAX5-Sf6-X4n-8WvsbevjnKFLnV8VhJQOZyVIOe7ZytDpjUoRNfmLCUlfV0g6OXQ/exec', {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                showMessage('✓ Your availability has been saved!', 'success');
                setTimeout(() => resetForm(), 2000);
            })
            .catch(error => {
                console.error('Error:', error);
                const summary = daysArray.map(d => `${d.date} (${d.timeSlot})`).join('\n');
                showMessage('Availability recorded locally. Send this to admin:\n' + summary, 'success');
            });
        }
        
        function resetForm() {
            selectedDays.clear();
            currentTeam = null;
            currentEmail = null;
            currentDate = new Date();
            selectedDateForModal = null;
            selectedTimeForModal = null;
            
            document.querySelector('.login-section').style.display = 'block';
            document.getElementById('calendarWrapper').classList.remove('active');
            document.getElementById('teamName').value = '';
            document.getElementById('contactEmail').value = '';
            document.getElementById('message').innerHTML = '';
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.className = `message ${type}`;
            msg.textContent = text;
        }
        
        // Close modal on background click
        document.getElementById('timeModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('timeModal')) {
                closeTimeModal();
            }
        });
    </script>
</body>
</html>
