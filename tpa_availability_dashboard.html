<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPA D1 Availability Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1F4E78 0%, #2E5C8A 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .subtitle { font-size: 14px; opacity: 0.9; }
        .controls { background: white; border-radius: 8px; padding: 20px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .controls label { font-weight: 500; color: #333; }
        .controls input { padding: 8px 12px; border: 1px solid #D0D0D0; border-radius: 6px; font-size: 14px; flex: 1; min-width: 300px; }
        .controls button { padding: 8px 16px; background: #1F4E78; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .controls button:hover { background: #163857; }
        .dashboard { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-x: auto; margin-bottom: 24px; }
        .dashboard h2 { font-size: 18px; color: #1F4E78; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px 8px; text-align: left; border: 1px solid #E0E0E0; }
        th { background: #F5F5F5; font-weight: 600; color: #333; }
        .date-cell { font-weight: 600; color: #1F4E78; min-width: 120px; }
        .team-badge { display: inline-block; background: #1F4E78; color: white; padding: 4px 8px; border-radius: 4px; margin: 2px 4px 2px 0; font-size: 12px; white-space: nowrap; }
        .team-count { display: inline-block; background: #D4E7F7; color: #1F4E78; padding: 2px 6px; border-radius: 3px; font-weight: 600; font-size: 11px; margin-left: 6px; }
        .has-teams { background: #E8F5E9; }
        .empty { background: #FAFAFA; color: #999; font-style: italic; }
        .loading { text-align: center; color: #999; padding: 40px; }
        .error { background: #FFEBEE; color: #C62828; padding: 16px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #EF9A9A; }
        .legend { margin-top: 24px; padding-top: 16px; border-top: 1px solid #E0E0E0; font-size: 13px; display: flex; gap: 24px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-box { width: 20px; height: 20px; border-radius: 4px; border: 1px solid #E0E0E0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TPA D1 League — Live Availability</h1>
            <p class="subtitle">See which teams are available on each day</p>
        </header>
        
        <div class="controls">
            <label>Google Sheet URL:</label>
            <input type="text" id="sheetUrl" placeholder="Paste your Google Sheet URL">
            <button onclick="loadData()">Load Dashboard</button>
            <button onclick="refreshData()" style="background: #666;">Refresh</button>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div class="dashboard">
            <h2>Team Availability by Date & Time</h2>
            <div id="dashboardContent" class="loading">
                Enter your Google Sheet URL above and click "Load Dashboard"
            </div>
        </div>
    </div>

    <script>
        function getSheetIdFromUrl(url) {
            const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
            return match ? match[1] : null;
        }
        
        function getCsvUrl(sheetId, sheetName = 'Raw%20Submissions') {
            return `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
        }
        
        async function loadData() {
            const url = document.getElementById('sheetUrl').value.trim();
            if (!url) {
                showError('Please enter a Google Sheet URL');
                return;
            }
            
            const sheetId = getSheetIdFromUrl(url);
            if (!sheetId) {
                showError('Invalid URL format');
                return;
            }
            
            fetchAndDisplay(sheetId);
        }
        
        async function fetchAndDisplay(sheetId) {
            try {
                document.getElementById('dashboardContent').innerHTML = '<div class="loading">Loading...</div>';
                clearError();
                
                const csvUrl = getCsvUrl(sheetId, 'Raw%20Submissions');
                const response = await fetch(csvUrl);
                
                if (!response.ok) {
                    throw new Error('Sheet not found or not shared publicly');
                }
                
                const csv = await response.text();
                const data = parseCSV(csv);
                
                if (!data || data.length === 0) {
                    document.getElementById('dashboardContent').innerHTML = '<div class="loading">No data found in Raw Submissions sheet</div>';
                    return;
                }
                
                const aggregated = aggregateData(data);
                displayDashboard(aggregated);
                
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }
        
        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            if (lines.length < 2) return [];
            
            // Parse header
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const data = [];
            
            // Parse rows
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(',');
                const row = {};
                
                headers.forEach((header, idx) => {
                    row[header] = (parts[idx] || '').trim().replace(/"/g, '');
                });
                
                // Only add if has required fields
                if (row.Date && row['Time Slot'] && row['Team Name']) {
                    data.push(row);
                }
            }
            
            return data;
        }
        
        function aggregateData(rawData) {
            const grouped = {};
            
            rawData.forEach(row => {
                const date = row.Date.trim();
                const time = row['Time Slot'].trim();
                const team = row['Team Name'].trim();
                
                const key = `${date}|${time}`;
                if (!grouped[key]) {
                    grouped[key] = { date, time, teams: new Set() };
                }
                grouped[key].teams.add(team);
            });
            
            return Object.values(grouped).map(item => ({
                date: item.date,
                time: item.time,
                teams: Array.from(item.teams),
                count: item.teams.size
            }));
        }
        
        function displayDashboard(data) {
            // Group by date
            const byDate = {};
            data.forEach(item => {
                if (!byDate[item.date]) byDate[item.date] = {};
                byDate[item.date][item.time] = item;
            });
            
            const dates = Object.keys(byDate).sort();
            const times = ['Morning', 'Afternoon', 'Evening', 'Flexible (Anytime)'];
            
            let html = '<table><thead><tr><th class="date-cell">Date</th>';
            times.forEach(t => html += `<th>${t}</th>`);
            html += '</tr></thead><tbody>';
            
            dates.forEach(date => {
                html += `<tr><td class="date-cell">${date}</td>`;
                times.forEach(time => {
                    const item = byDate[date][time];
                    if (item && item.teams.length > 0) {
                        const badges = item.teams.map(t => `<span class="team-badge">${t}</span>`).join('');
                        html += `<td class="has-teams">${badges}<span class="team-count">${item.count}</span></td>`;
                    } else {
                        html += '<td class="empty">—</td>';
                    }
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            html += `<div class="legend">
                <div class="legend-item"><div class="legend-box" style="background: #E8F5E9;"></div> Teams available</div>
                <div class="legend-item"><div class="legend-box" style="background: #FAFAFA;"></div> None available</div>
            </div>`;
            
            document.getElementById('dashboardContent').innerHTML = html;
        }
        
        function refreshData() {
            const url = document.getElementById('sheetUrl').value.trim();
            const sheetId = getSheetIdFromUrl(url);
            if (sheetId) fetchAndDisplay(sheetId);
        }
        
        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }
        
        function clearError() {
            document.getElementById('error').style.display = 'none';
        }
    </script>
</body>
</html>
