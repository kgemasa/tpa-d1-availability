<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPA D1 Availability Calendar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1F4E78 0%, #2E5C8A 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .subtitle { font-size: 14px; opacity: 0.9; }
        .controls { background: white; border-radius: 8px; padding: 20px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .controls label { font-weight: 500; color: #333; }
        .controls input { padding: 8px 12px; border: 1px solid #D0D0D0; border-radius: 6px; font-size: 14px; flex: 1; min-width: 300px; }
        .controls button { padding: 8px 16px; background: #1F4E78; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .controls button:hover { background: #163857; }
        .calendar-container { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .calendar-header h2 { font-size: 20px; color: #1F4E78; }
        .month-nav button { padding: 8px 12px; margin-left: 8px; background: #1F4E78; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .month-nav button:hover { background: #163857; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 12px; }
        .weekday-header { text-align: center; font-weight: 600; color: #666; padding: 12px; border-bottom: 2px solid #E0E0E0; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-cell { background: #FAFAFA; border: 1px solid #E0E0E0; border-radius: 6px; padding: 12px; min-height: 150px; display: flex; flex-direction: column; }
        .day-cell.other-month { background: #F0F0F0; color: #999; }
        .day-date { font-weight: 600; color: #1F4E78; font-size: 14px; margin-bottom: 8px; }
        .day-cell.other-month .day-date { color: #BBB; }
        .team-item { background: #1F4E78; color: white; padding: 6px 8px; border-radius: 4px; margin-bottom: 4px; font-size: 12px; line-height: 1.3; }
        .team-item.morning { background: #7B68EE; }
        .team-item.afternoon { background: #FF8C42; }
        .team-item.evening { background: #2E7D32; }
        .team-item.flexible { background: #C9A84C; }
        .error { background: #FFEBEE; color: #C62828; padding: 16px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #EF9A9A; }
        .loading { text-align: center; color: #999; padding: 40px; }
        .legend { margin-top: 24px; padding-top: 16px; border-top: 1px solid #E0E0E0; font-size: 13px; display: flex; gap: 24px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-box { width: 16px; height: 16px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TPA D1 League — Availability Calendar</h1>
            <p class="subtitle">See which teams are available on each day</p>
        </header>
        
        <div class="controls">
            <label>Google Sheet URL:</label>
            <input type="text" id="sheetUrl" placeholder="Paste your Google Sheet URL">
            <button onclick="loadData()">Load Calendar</button>
            <button onclick="refreshData()" style="background: #666;">Refresh</button>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div class="calendar-container">
            <div class="calendar-header">
                <h2 id="monthTitle">March 2026</h2>
                <div class="month-nav">
                    <button onclick="prevMonth()">← Previous</button>
                    <button onclick="nextMonth()">Next →</button>
                </div>
            </div>
            
            <div class="weekdays">
                <div class="weekday-header">Sun</div>
                <div class="weekday-header">Mon</div>
                <div class="weekday-header">Tue</div>
                <div class="weekday-header">Wed</div>
                <div class="weekday-header">Thu</div>
                <div class="weekday-header">Fri</div>
                <div class="weekday-header">Sat</div>
            </div>
            
            <div id="calendarGrid" class="calendar-grid loading">
                Enter your Google Sheet URL above and click "Load Calendar"
            </div>
            
            <div class="legend">
                <div class="legend-item"><div class="legend-box" style="background: #7B68EE;"></div> Morning (9am-12pm)</div>
                <div class="legend-item"><div class="legend-box" style="background: #FF8C42;"></div> Afternoon (12pm-4pm)</div>
                <div class="legend-item"><div class="legend-box" style="background: #2E7D32;"></div> Evening (4pm-8pm)</div>
                <div class="legend-item"><div class="legend-box" style="background: #C9A84C;"></div> Flexible (Anytime)</div>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date(2026, 2, 1); // March 2026
        let availabilityData = [];
        
        function getSheetIdFromUrl(url) {
            const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
            return match ? match[1] : null;
        }
        
        function getCsvUrl(sheetId) {
            return `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Raw%20Submissions`;
        }
        
        async function loadData() {
            const url = document.getElementById('sheetUrl').value.trim();
            if (!url) {
                showError('Please enter a Google Sheet URL');
                return;
            }
            
            const sheetId = getSheetIdFromUrl(url);
            if (!sheetId) {
                showError('Invalid URL format');
                return;
            }
            
            fetchAndDisplay(sheetId);
        }
        
        async function fetchAndDisplay(sheetId) {
            try {
                clearError();
                const csvUrl = getCsvUrl(sheetId);
                const response = await fetch(csvUrl);
                
                if (!response.ok) {
                    throw new Error('Sheet not found or not shared publicly');
                }
                
                const csv = await response.text();
                const data = parseCSV(csv);
                
                if (!data || data.length === 0) {
                    showError('No data found in Raw Submissions sheet');
                    return;
                }
                
                availabilityData = data;
                renderCalendar();
                
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }
        
        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(',');
                const row = {};
                
                headers.forEach((header, idx) => {
                    row[header] = (parts[idx] || '').trim().replace(/"/g, '');
                });
                
                if (row.Date && row['Time Slot'] && row['Team Name']) {
                    data.push(row);
                }
            }
            
            return data;
        }
        
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('monthTitle').textContent = currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDayOfWeek = firstDay.getDay();
            
            let html = '';
            
            // Previous month's days
            const prevMonthDays = new Date(year, month, 0).getDate();
            for (let i = startingDayOfWeek - 1; i >= 0; i--) {
                html += `<div class="day-cell other-month"></div>`;
            }
            
            // Current month's days
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayAvailability = availabilityData.filter(d => d.Date === dateStr);
                
                html += `<div class="day-cell">
                    <div class="day-date">${day}</div>`;
                
                if (dayAvailability.length > 0) {
                    dayAvailability.forEach(item => {
                        const timeSlot = item['Time Slot'];
                        const timeClass = timeSlot.toLowerCase().replace(/\s+/g, '').replace('flexible(anytime)', 'flexible');
                        html += `<div class="team-item ${timeClass}">${item['Team Name']}<br><small>${timeSlot}</small></div>`;
                    });
                }
                
                html += `</div>`;
            }
            
            // Next month's days
            const totalCells = startingDayOfWeek + daysInMonth;
            const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 0; i < remainingCells; i++) {
                html += `<div class="day-cell other-month"></div>`;
            }
            
            document.getElementById('calendarGrid').innerHTML = html;
        }
        
        function prevMonth() {
            currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1);
            renderCalendar();
        }
        
        function nextMonth() {
            currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1);
            renderCalendar();
        }
        
        function refreshData() {
            const url = document.getElementById('sheetUrl').value.trim();
            const sheetId = getSheetIdFromUrl(url);
            if (sheetId) fetchAndDisplay(sheetId);
        }
        
        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }
        
        function clearError() {
            document.getElementById('error').style.display = 'none';
        }
    </script>
</body>
</html>
